<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bocetos de Arquitectura 2D</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f0f0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Barra de herramientas */
        .toolbar {
            background-color: #333;
            color: white;
            padding: 10px 20px;
            display: flex;
            gap: 15px;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            z-index: 10;
        }

        .toolbar button {
            padding: 8px 12px;
            background-color: #555;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .toolbar button:hover {
            background-color: #777;
        }

        .toolbar button.active {
            background-color: #4CAF50;
        }

        .toolbar input[type="color"] {
            cursor: pointer;
        }

        /* Área de dibujo con patrón de cuadrícula de arquitectura */
        .canvas-container {
            flex-grow: 1;
            position: relative;
            overflow: hidden;
            background-color: white;
            background-image: 
                linear-gradient(#e5e5e5 1px, transparent 1px),
                linear-gradient(90deg, #e5e5e5 1px, transparent 1px),
                linear-gradient(#d0d0d0 1px, transparent 1px),
                linear-gradient(90deg, #d0d0d0 1px, transparent 1px);
            background-size: 20px 20px, 20px 20px, 100px 100px, 100px 100px;
        }

        canvas {
            display: block;
            cursor: crosshair;
        }
    </style>
</head>
<body>

    <div class="toolbar">
        <button id="btnFreehand" class="active" onclick="setTool('freehand')">✏️ Trazo Libre</button>
        <button id="btnLine" onclick="setTool('line')">📏 Línea Recta</button>
        <button id="btnRect" onclick="setTool('rect')">🟦 Rectángulo</button>
        <button id="btnEraser" onclick="setTool('eraser')">🧼 Borrador</button>
        
        <span style="margin-left: 20px;">Color:</span>
        <input type="color" id="colorPicker" value="#000000">
        
        <span>Grosor:</span>
        <input type="range" id="lineWidth" min="1" max="10" value="2">

        <button onclick="clearCanvas()" style="margin-left: auto; background-color: #d32f2f;">🗑️ Limpiar Plano</button>
    </div>

    <div class="canvas-container">
        <canvas id="drawingCanvas"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('drawingCanvas');
        const ctx = canvas.getContext('2d');
        const colorPicker = document.getElementById('colorPicker');
        const lineWidth = document.getElementById('lineWidth');

        // Estado del dibujo
        let isDrawing = false;
        let currentTool = 'freehand';
        let startX, startY;
        let snapshot; // Para guardar el estado del lienzo al dibujar formas

        // Ajustar el canvas al tamaño de la pantalla
        function resizeCanvas() {
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = canvas.parentElement.clientHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // Cambiar de herramienta
        function setTool(tool) {
            currentTool = tool;
            // Actualizar botones visualmente
            document.querySelectorAll('.toolbar button').forEach(btn => btn.classList.remove('active'));
            if(tool === 'freehand') document.getElementById('btnFreehand').classList.add('active');
            if(tool === 'line') document.getElementById('btnLine').classList.add('active');
            if(tool === 'rect') document.getElementById('btnRect').classList.add('active');
            if(tool === 'eraser') document.getElementById('btnEraser').classList.add('active');
        }

        // Limpiar el lienzo
        function clearCanvas() {
            if(confirm('¿Estás seguro de que deseas limpiar el plano completo?')) {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
            }
        }

        // Configuración inicial del trazo
        function startDraw(e) {
            isDrawing = true;
            startX = e.offsetX;
            startY = e.offsetY;

            ctx.beginPath();
            ctx.moveTo(startX, startY);
            
            // Guardar el estado actual del lienzo para previsualizar líneas y rectángulos sin dejar rastro
            snapshot = ctx.getImageData(0, 0, canvas.width, canvas.height);

            // Configurar color y grosor
            ctx.strokeStyle = currentTool === 'eraser' ? '#ffffff' : colorPicker.value;
            ctx.lineWidth = currentTool === 'eraser' ? lineWidth.value * 5 : lineWidth.value;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
        }

        // Proceso de dibujo en movimiento
        function drawing(e) {
            if (!isDrawing) return;

            // Si es línea o rectángulo, restauramos el lienzo al estado inicial del clic para "animar" la forma
            if (currentTool === 'line' || currentTool === 'rect') {
                ctx.putImageData(snapshot, 0, 0);
            }

            if (currentTool === 'freehand' || currentTool === 'eraser') {
                ctx.lineTo(e.offsetX, e.offsetY);
                ctx.stroke();
            } else if (currentTool === 'line') {
                ctx.beginPath();
                ctx.moveTo(startX, startY);
                ctx.lineTo(e.offsetX, e.offsetY);
                ctx.stroke();
            } else if (currentTool === 'rect') {
                ctx.beginPath();
                const width = e.offsetX - startX;
                const height = e.offsetY - startY;
                ctx.rect(startX, startY, width, height);
                ctx.stroke();
            }
        }

        // Finalizar el trazo
        function endDraw() {
            isDrawing = false;
            ctx.closePath();
        }

        // Eventos del ratón
        canvas.addEventListener('mousedown', startDraw);
        canvas.addEventListener('mousemove', drawing);
        canvas.addEventListener('mouseup', endDraw);
        canvas.addEventListener('mouseout', endDraw);
    </script>
</body>
</html>
